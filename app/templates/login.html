{% extends "base.html" %}
{% block content %}
<section class="mx-auto max-w-md rounded-2xl border border-slate-800 bg-slate-900/60 p-6">
  <p class="meta">Authentication</p>
  <h1 class="mt-2 text-2xl font-semibold">Sign in</h1>
  <p class="mt-2 text-sm text-slate-400">Use the admin account created in setup.</p>

  {% if error %}
    <div class="mt-4 rounded-xl border border-rose-700/50 bg-rose-900/20 px-4 py-3 text-sm text-rose-200">{{ error }}</div>
  {% endif %}

  <form method="post" action="/login" class="mt-5 space-y-4">
    <input type="hidden" name="next_url" value="{{ next or '/' }}" />
    <label class="block text-sm">
      <span class="mb-1 block text-slate-300">Username</span>
      <input name="username" required class="w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
    </label>
    <label class="block text-sm">
      <span class="mb-1 block text-slate-300">Password</span>
      <input type="password" name="password" required class="w-full rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
    </label>
    <button class="pill" type="submit">Sign in</button>
  </form>
</section>
{% endblock %}
